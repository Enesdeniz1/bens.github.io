<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enes Deniz Link - RGB Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 50px;
            text-align: center;
            background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff, #ff0000);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rgb-text 5s linear infinite;
        }

        .container {
            width: 90%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* RGB Buton Yapısı */
        .rgb-card {
            position: relative;
            padding: 4px; /* Kenar ışığı kalınlığı */
            border-radius: 15px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            animation: rgb-glow 20s linear infinite;
            text-decoration: none;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .rgb-card:active {
            transform: scale(0.95);
        }

        /* Butonun İç Kısmı (Siyah Alan) */
        .inner-content {
            background: #0f0f0f;
            color: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .rgb-card:hover .inner-content {
            background: transparent;
            text-shadow: 0 0 10px #fff;
        }

        /* RGB Animasyonları */
        @keyframes rgb-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes rgb-text {
            0% { background-position: 0%; }
            100% { background-position: 100%; }
        }

        /* Arka Plan Hareketli Işıklar */
        body::before {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            background: #ff0000;
            filter: blur(150px);
            top: 10%;
            left: 10%;
            z-index: -1;
            opacity: 0.3;
        }

        body::after {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            background: #002bff;
            filter: blur(150px);
            bottom: 10%;
            right: 10%;
            z-index: -1;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <h1>ENES DENİZ LİNK</h1>

    <div class="container">
        <a href="https://www.instagram.com/hfwxq" class="rgb-card" target="_blank">
            <div class="inner-content">INSTAGRAM</div>
        </a>

        <a href="https://open.spotify.com/artist/6959ZHcGVFcNUQxjIdQswy?si=Uuze69s6T0SOKZ98Mf-G5Q" class="rgb-card" target="_blank">
            <div class="inner-content">SPOTİFY</div>
        </a>
    </div>

</body>
</html>
