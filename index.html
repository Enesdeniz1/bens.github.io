<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapTools</title>

<style>
*{box-sizing:border-box;font-family:Arial;}
body{margin:0;background:#f4f4f4;text-align:center;}

header{
display:flex;justify-content:space-between;
padding:15px;background:black;color:white;
}

.menu{font-size:22px;cursor:pointer;}

.sidebar{
position:fixed;left:-280px;top:0;
width:280px;height:100%;
background:white;transition:.3s;
padding:15px;overflow:auto;
z-index:10;
}

.sidebar.active{left:0;}

.close{
font-size:20px;
cursor:pointer;
text-align:right;
}

.box{
background:white;margin:15px;padding:20px;
border-radius:12px;
}

textarea,input{
width:100%;padding:10px;margin-top:10px;
}

button{
margin-top:10px;padding:10px;width:100%;
background:black;color:white;border:none;
}

.plan{
background:#eee;margin-top:10px;padding:10px;
border-radius:8px;cursor:pointer;
}

.note-item{
background:#eee;padding:8px;margin:5px 0;
cursor:pointer;text-align:left;
}

.delete{
float:right;color:red;cursor:pointer;
}

.insta{
font-size:13px;color:#777;text-decoration:none;
}

</style>
</head>

<body>

<header>
<div class="menu" onclick="toggleMenu()">☰</div>
<div>⚡ SnapTools</div>
<div></div>
</header>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="close" onclick="toggleMenu()">✖</div>

<h3>📒 Notlar</h3>
<div id="noteList"></div>

<h3>💎 Premium</h3>

<div class="plan" onclick="startPayment('monthly')">
Aylık - 50 TL
</div>

<div class="plan" onclick="startPayment('yearly')">
Yıllık - 1000 TL
</div>

<p id="premiumStatus"></p>

</div>

<div class="box">
<h3>Metin Özet</h3>
<textarea id="text"></textarea>
<button onclick="summarize()">Özetle</button>
<div id="summary"></div>
</div>

<div class="box">
<h3>Hashtag</h3>
<input id="tagInput">
<button onclick="hashtags()">Oluştur</button>
<div id="tags"></div>
</div>

<div class="box">
<h3>Not Defteri</h3>
<textarea id="note"></textarea>
<button onclick="saveNote()">Kaydet</button>
</div>

<!-- 📸 Instagram -->
<div style="margin:20px;">
<a href="https://instagram.com/hfwxq" target="_blank" class="insta">
@hfwxq
</a>
</div>

<script>

// Menü
function toggleMenu(){
sidebar.classList.toggle("active");
}

// Dışarı tıklayınca kapat
document.addEventListener("click", function(e){
if(!sidebar.contains(e.target) && !e.target.classList.contains("menu")){
sidebar.classList.remove("active");
}
});

// Notları yükle
function loadNotes(){
let notes=JSON.parse(localStorage.getItem("notes")||"[]");
noteList.innerHTML="";

notes.forEach((n,i)=>{
let div=document.createElement("div");
div.className="note-item";

div.innerHTML=
n.substring(0,20)+"... "+
"<span class='delete'>✖</span>";

// NOTA TIKLAMA
div.onclick=()=> note.value=n;

// SİL BUTONU (fix)
div.querySelector(".delete").onclick=(e)=>{
e.stopPropagation();
deleteNote(i);
};

noteList.appendChild(div);
});
}

// Kaydet
function saveNote(){
let n=note.value;
if(!n)return;

let notes=JSON.parse(localStorage.getItem("notes")||"[]");
notes.push(n);
localStorage.setItem("notes",JSON.stringify(notes));

alert("Kaydedildi");
loadNotes();
}

// Sil
function deleteNote(i){
let notes=JSON.parse(localStorage.getItem("notes"));
notes.splice(i,1);
localStorage.setItem("notes",JSON.stringify(notes));
loadNotes();
}

// Özet
async function summarize(){
let t=text.value;
if(!t)return;

summary.innerText="Yükleniyor...";

try{
let res=await fetch("http://localhost:3000/summarize",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:t})
});

let data=await res.json();
summary.innerText=data.summary;
}catch{
summary.innerText="Hata!";
}
}

// Hashtag
function hashtags(){
let i=tagInput.value.toLowerCase().trim();
if(!i)return;

let base=i.replace(/\s+/g,"");

let tags=[
base,base+"edit",base+"video",
"viral","trend","fyp","explore",
"instagood","like","follow",
"contentcreator","growth","audience"
];

tags=[...new Set(tags)].slice(0,30);
tags=tags.map(t=>"#"+t).join(" ");

document.getElementById("tags").innerText=tags;
}

// Ödeme
async function startPayment(plan){
let res=await fetch("http://localhost:3000/create-payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({plan})
});

let data=await res.json();
window.location.href=data.url;
}

// Açılış
window.onload=loadNotes;

</script>

</body>
</html>
