<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yapım Aşamasında</title>

<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">

<style>
body{
margin:0;
background:#FFD700; /* SARI */
color:#0a1f44; /* LACİVERT */
font-family:'Digital-7 Mono', monospace;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
height:100vh;
}

/* SAAT */
.clock{
margin-top:30px;
font-size:48px;
letter-spacing:3px;
text-shadow:
0 0 5px #0a1f44,
0 0 10px #0a1f44,
0 0 20px rgba(10,31,68,0.6);
}

/* ORTA YAZI */
.text{
font-size:64px;
text-align:center;
line-height:1.2;
letter-spacing:5px;
text-shadow:
0 0 5px #0a1f44,
0 0 10px #0a1f44,
0 0 20px rgba(10,31,68,0.6);
}

/* ALT */
.footer{
margin-bottom:20px;
font-size:18px;
}

.footer a{
color:#0a1f44;
text-decoration:none;
text-shadow:0 0 8px #0a1f44;
}
</style>
</head>

<body>

<div class="clock" id="clock">00:00:00</div>

<div class="text">
YAPIM<br>ASAMASINDA
</div>

<div class="footer">
<a href="https://instagram.com/hfwxq" target="_blank">@hfwxq</a>
</div>

<script>
function updateClock(){
let now = new Date();
let h = String(now.getHours()).padStart(2,'0');
let m = String(now.getMinutes()).padStart(2,'0');
let s = String(now.getSeconds()).padStart(2,'0');

document.getElementById("clock").innerText = h + ":" + m + ":" + s;
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
