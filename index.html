<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engine of Life</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}

/* HEADER */
header{
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
background:linear-gradient(270deg,#ff0080,#7928ca,#2af598);
background-size:600% 600%;
animation:rgb 6s infinite;
}

@keyframes rgb{
0%{background-position:0%}
100%{background-position:100%}
}

/* MENU */
.menu-btn{position:fixed;top:15px;left:15px;font-size:25px;cursor:pointer}
.sidebar{
position:fixed;left:-270px;top:0;width:270px;height:100%;
background:#1e293b;overflow:auto;transition:0.3s;padding-top:60px
}
.sidebar a{display:block;padding:12px;border-bottom:1px solid #334155;cursor:pointer}
.sidebar a:hover{background:#334155}

/* OVERLAY */
.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;top:0
}

/* SEARCH */
.search{
width:90%;margin:15px;padding:12px;border-radius:8px;border:none
}

/* CARD */
.card{
background:#1e293b;
margin:10px;
padding:15px;
border-radius:12px;
position:relative;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* STAR */
.star{position:absolute;right:10px;top:10px;cursor:pointer}

/* VIDEO */
iframe{
width:100%;
height:200px;
margin-top:10px;
border-radius:10px;
}

/* STATS */
.stats{
text-align:center;
font-size:14px;
margin-top:5px;
opacity:0.8;
}

/* LEADERBOARD */
.leaderboard{
padding:10px;
}

/* AD */
.ad{
background:#111827;
margin:10px;
padding:15px;
border-radius:10px;
text-align:center;
opacity:0.8;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>
<header>🧠 Engine of Life</header>

<div class="stats" id="stats"></div>

<input class="search" placeholder="🔍 Hayatında ne lazım?" onkeyup="search(this.value)">

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="menu">
<a onclick="run('motivasyon')">🔥 Motivasyon</a>
<a onclick="run('para')">💸 Para</a>
<a onclick="run('sinav')">📚 Sınav</a>
<a onclick="run('uyku')">😴 Uyku</a>
<a onclick="run('sikildim')">😐 Sıkıldım</a>
<a onclick="showFav()">⭐ Favoriler</a>
<a onclick="smart()">🧠 AI Öner</a>
<a onclick="showBoard()">🏆 Leaderboard</a>
</div>

<div id="result"></div>

<div class="ad">💰 Reklam Alanı (Google AdSense eklenebilir)</div>

<script>

/* DATA */
let data={
motivasyon:["Şimdi başla, sonra değil","Bahaneleri bırak","Hedefine odaklan"],
para:["Freelance öğren","Video edit yap","Site kur para kazan"],
sinav:["Pomodoro yap","Çıkmış çöz","Özet oku"],
uyku:["Telefonu bırak","Gözlerini dinlendir","Rahat müzik aç"],
sikildim:["Film izle","Oyun oyna","Dışarı çık"]
};

let videos=[
"https://www.youtube.com/embed/ZXsQAXx_ao0",
"https://www.youtube.com/embed/5MgBikgcWnY"
];

/* STORAGE */
function get(k,d){return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}
function set(k,v){localStorage.setItem(k,JSON.stringify(v))}

/* RANDOM */
function rand(a){return a[Math.floor(Math.random()*a.length)]}

/* MENU */
function toggleMenu(){
menu.style.left = menu.style.left==="0px"?"-270px":"0px";
overlay.style.display = overlay.style.display==="block"?"none":"block";
}

/* FAVORITE */
function toggleFav(text){
let fav=get("fav",[]);
fav.includes(text)?fav=fav.filter(f=>f!==text):fav.push(text);
set("fav",fav);
render(text);
}

function showFav(){
let fav=get("fav",[]);
let html="";
fav.forEach(f=>html+=card(f));
result.innerHTML=html||"Favori yok";
toggleMenu();
}

/* SCORE + STREAK */
function statsUpdate(){
let score=get("score",0);
let streak=get("streak",1);
let online=Math.floor(Math.random()*500)+100;
stats.innerHTML=`⭐ ${score} Puan | 🔥 ${streak} Gün | 🌐 ${online} Online`;
}

function addScore(){
let s=get("score",0)+10;
set("score",s);
statsUpdate();
}

/* SMART AI */
function smart(){
let usage=get("usage",{});
let best=Object.keys(usage).sort((a,b)=>usage[b]-usage[a])[0];
run(best||"motivasyon");
}

/* RUN */
function run(type){
let usage=get("usage",{});
usage[type]=(usage[type]||0)+1;
set("usage",usage);

let text=rand(data[type]);
render(text);
addScore();
toggleMenu();
}

/* CARD */
function card(text){
let fav=get("fav",[]).includes(text)?"⭐":"☆";
let video=rand(videos);

return `
<div class="card">
<span class="star" onclick="toggleFav('${text}')">${fav}</span>
🤖 AI: ${text}
<iframe src="${video}"></iframe>
</div>`;
}

function render(text){
result.innerHTML=card(text);
}

/* SEARCH */
function search(q){
q=q.toLowerCase();
let html="";
Object.keys(data).forEach(k=>{
data[k].forEach(v=>{
if(v.toLowerCase().includes(q)) html+=card(v);
});
});
result.innerHTML=html||"Sonuç yok";
}

/* LEADERBOARD (fake global) */
function showBoard(){
let names=["Alex","Mehmet","John","Ayşe","Ali"];
let html="<div class='leaderboard'>";
names.forEach(n=>{
html+=`<div class="card">🏆 ${n} - ${Math.floor(Math.random()*1000)} puan</div>`;
});
html+="</div>";
result.innerHTML=html;
toggleMenu();
}

/* INIT */
statsUpdate();

</script>

</body>
</html>
