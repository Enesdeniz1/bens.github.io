<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yapım Aşamasında</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
background:#FFD700; /* SARI */
color:#0a1f44; /* LACİVERT */
font-family:Arial;
}

/* SAAT */
.clock{
margin-top:20px;
font-size:28px;
font-weight:bold;
}

/* ORTA YAZI */
.center{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:bold;
text-align:center;
}

/* ALT */
.footer{
margin-bottom:15px;
font-size:14px;
}

.footer a{
color:#0a1f44;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="clock" id="clock">00:00:00</div>

<div class="center">
YAPIM AŞAMASINDA
</div>

<div class="footer">
<a href="https://instagram.com/hfwxq" target="_blank">@hfwxq</a>
</div>

<script>
function updateClock(){
let now = new Date();
let h = String(now.getHours()).padStart(2,'0');
let m = String(now.getMinutes()).padStart(2,'0');
let s = String(now.getSeconds()).padStart(2,'0');
document.getElementById("clock").innerText = h + ":" + m + ":" + s;
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
