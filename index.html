<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapTools</title>

<style>
*{box-sizing:border-box;font-family:Arial;}
body{margin:0;background:#f4f4f4;}

header{
display:flex;justify-content:space-between;
align-items:center;
padding:15px;background:black;color:white;
}

.left{display:flex;align-items:center;gap:10px;}
.menu{font-size:22px;cursor:pointer;}

.lang{
background:white;color:black;
padding:5px 10px;border-radius:6px;
cursor:pointer;font-size:12px;
}

.sidebar{
position:fixed;left:-280px;top:0;
width:280px;height:100%;
background:white;transition:.3s;
padding:15px;overflow:auto;
z-index:10;
}

.sidebar.active{left:0;}

.close{text-align:right;cursor:pointer;}

.container{max-width:500px;margin:auto;}

.box{
background:white;margin:15px;padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

textarea,input{
width:100%;padding:10px;margin-top:10px;
border-radius:8px;border:1px solid #ccc;
}

button{
margin-top:10px;padding:10px;width:100%;
background:black;color:white;border:none;
border-radius:8px;
}

.result{
margin-top:10px;
background:#eee;padding:10px;border-radius:8px;
word-break:break-word;
}

.copy{
background:#333;color:white;
margin-top:5px;
}

.note-item{
background:#eee;padding:8px;margin:5px 0;
cursor:pointer;text-align:left;border-radius:6px;
}

.delete{float:right;color:red;}

.insta{
display:block;text-align:center;
font-size:13px;color:#777;margin:20px;
}

</style>
</head>

<body>

<header>
<div class="left">
<div class="menu" onclick="toggleMenu()">☰</div>
<div>⚡ SnapTools</div>
</div>

<div class="lang" onclick="toggleLang()">TR / EN</div>
</header>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="close" onclick="toggleMenu()">✖</div>

<h3 id="notesTitle">📒 Notlar</h3>
<div id="noteList"></div>

<h3 id="premiumTitle">💎 Premium</h3>
<div class="plan" onclick="startPayment('monthly')" id="monthly">Aylık - 50 TL</div>
<div class="plan" onclick="startPayment('yearly')" id="yearly">Yıllık - 1000 TL</div>

</div>

<div class="container">

<!-- ÖZET -->
<div class="box">
<h3 id="sumTitle">Metin Özet</h3>
<textarea id="text"></textarea>
<button onclick="summarize()" id="sumBtn">Özetle</button>
<div class="result" id="summary"></div>
<button class="copy" onclick="copyText('summary')">Kopyala</button>
</div>

<!-- HASHTAG -->
<div class="box">
<h3 id="tagTitle">Viral Hashtag</h3>
<input id="tagInput">
<button onclick="hashtags()" id="tagBtn">Oluştur</button>
<div class="result" id="tags"></div>
<button class="copy" onclick="copyText('tags')">Kopyala</button>
</div>

<!-- NOT -->
<div class="box">
<h3 id="noteTitle">Not Defteri</h3>
<textarea id="note"></textarea>
<button onclick="saveNote()" id="saveBtn">Kaydet</button>
</div>

</div>

<a href="https://instagram.com/hfwxq" target="_blank" class="insta">@hfwxq</a>

<script>

// 🌍 DİL
let lang = localStorage.getItem("lang") || "tr";

const texts={
tr:{
notes:"📒 Notlar",
premium:"💎 Premium",
sum:"Metin Özet",
sumBtn:"Özetle",
tag:"Viral Hashtag",
tagBtn:"Oluştur",
note:"Not Defteri",
save:"Kaydet"
},
en:{
notes:"📒 Notes",
premium:"💎 Premium",
sum:"Text Summary",
sumBtn:"Summarize",
tag:"Viral Hashtags",
tagBtn:"Generate",
note:"Notepad",
save:"Save"
}
};

function applyLang(){
let t=texts[lang];
notesTitle.innerText=t.notes;
premiumTitle.innerText=t.premium;
sumTitle.innerText=t.sum;
sumBtn.innerText=t.sumBtn;
tagTitle.innerText=t.tag;
tagBtn.innerText=t.tagBtn;
noteTitle.innerText=t.note;
saveBtn.innerText=t.save;
}

function toggleLang(){
lang=(lang==="tr")?"en":"tr";
localStorage.setItem("lang",lang);
applyLang();
}

// MENU
function toggleMenu(){sidebar.classList.toggle("active");}

// NOTLAR
function loadNotes(){
let notes=JSON.parse(localStorage.getItem("notes")||"[]");
noteList.innerHTML="";

notes.forEach((n,i)=>{
let div=document.createElement("div");
div.className="note-item";

div.innerHTML=n.substring(0,20)+"... <span class='delete'>✖</span>";

div.onclick=()=>note.value=n;

div.querySelector(".delete").onclick=(e)=>{
e.stopPropagation();
deleteNote(i);
};

noteList.appendChild(div);
});
}

function saveNote(){
let n=note.value;
if(!n)return;

let notes=JSON.parse(localStorage.getItem("notes")||"[]");
notes.push(n);
localStorage.setItem("notes",JSON.stringify(notes));

alert(lang==="tr"?"Kaydedildi":"Saved");
loadNotes();
}

function deleteNote(i){
let notes=JSON.parse(localStorage.getItem("notes"));
notes.splice(i,1);
localStorage.setItem("notes",JSON.stringify(notes));
loadNotes();
}

// AI ÖZET
async function summarize(){
let t=text.value;
if(!t)return;

summary.innerText="...";

let res=await fetch("http://localhost:3000/summarize",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:t})
});

let data=await res.json();
summary.innerText=data.summary;
}

// 🔥 VİRAL HASHTAG
function hashtags(){
let i=tagInput.value.toLowerCase().trim();
if(!i)return;

let base=i.replace(/\s+/g,"");

let tags=[
base,base+"viral",base+"edit",
"viral","trend","fyp","explore",
"instagood","reels","tiktok",
"contentcreator","growth","audience",
"viralvideo","trending","discover"
];

tags=[...new Set(tags)].slice(0,30);
tags=tags.map(t=>"#"+t).join(" ");

tagsDiv.innerText=tags;
}

// 📋 KOPYALA
function copyText(id){
let text=document.getElementById(id).innerText;
navigator.clipboard.writeText(text);
alert("Kopyalandı!");
}

// ödeme
async function startPayment(plan){
let res=await fetch("http://localhost:3000/create-payment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({plan})
});
let data=await res.json();
window.location.href=data.url;
}

// INIT
window.onload=()=>{
applyLang();
loadNotes();
};
</script>

</body>
</html>
