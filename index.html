<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Tools</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: #f4f4f4;
  text-align: center;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: black;
  color: white;
}

button.lang {
  background: white;
  color: black;
  border-radius: 6px;
  padding: 5px 10px;
  border: none;
}

.container {
  max-width: 500px;
  margin: auto;
}

.box {
  background: white;
  padding: 20px;
  margin: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

textarea, input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 10px;
  background: #eee;
  padding: 10px;
  border-radius: 8px;
}

.insta {
  color:#777;
  text-decoration:none;
  transition:0.3s;
  font-size:13px;
}
.insta:hover {
  color:black;
}
</style>
</head>

<body>

<header>
  <span id="title">⚡ Mini Araçlar</span>
  <button class="lang" onclick="toggleLang()">TR / EN</button>
</header>

<div class="container">

  <div class="box">
    <h3 id="sumTitle">Metin Özetleyici</h3>
    <textarea id="text" placeholder="Metni buraya yapıştır..."></textarea>
    <button onclick="ozetle()" id="sumBtn">Özetle</button>
    <div class="result" id="summary"></div>
  </div>

  <div class="box">
    <h3 id="tagTitle">Hashtag Oluşturucu</h3>
    <input id="tagInput" placeholder="Konu yaz">
    <button onclick="createTags()" id="tagBtn">Oluştur</button>
    <div class="result" id="tags"></div>
  </div>

  <div class="box">
    <h3 id="noteTitle">Not Defteri</h3>
    <textarea id="note" placeholder="Notunu yaz..."></textarea>
    <button onclick="saveNote()" id="saveBtn">Kaydet</button>
  </div>

</div>

<!-- 🔥 Instagram Link -->
<div style="text-align:center; margin:20px 0;">
  <a href="https://instagram.com/hfwxq" target="_blank" class="insta">
    @hfwxq
  </a>
</div>

<script>
let lang = localStorage.getItem("lang") || "tr";

const texts = {
  tr: {
    title: "⚡ Mini Araçlar",
    sumTitle: "Metin Özetleyici",
    sumBtn: "Özetle",
    tagTitle: "Hashtag Oluşturucu",
    tagBtn: "Oluştur",
    noteTitle: "Not Defteri",
    saveBtn: "Kaydet",
    placeholderText: "Metni buraya yapıştır...",
    placeholderTag: "Konu yaz",
    placeholderNote: "Notunu yaz..."
  },
  en: {
    title: "⚡ Mini Tools",
    sumTitle: "Text Summarizer",
    sumBtn: "Summarize",
    tagTitle: "Hashtag Generator",
    tagBtn: "Generate",
    noteTitle: "Notepad",
    saveBtn: "Save",
    placeholderText: "Paste your text here...",
    placeholderTag: "Enter topic",
    placeholderNote: "Write your note..."
  }
};

function applyLang() {
  const t = texts[lang];

  document.getElementById("title").innerText = t.title;
  document.getElementById("sumTitle").innerText = t.sumTitle;
  document.getElementById("sumBtn").innerText = t.sumBtn;
  document.getElementById("tagTitle").innerText = t.tagTitle;
  document.getElementById("tagBtn").innerText = t.tagBtn;
  document.getElementById("noteTitle").innerText = t.noteTitle;
  document.getElementById("saveBtn").innerText = t.saveBtn;

  document.getElementById("text").placeholder = t.placeholderText;
  document.getElementById("tagInput").placeholder = t.placeholderTag;
  document.getElementById("note").placeholder = t.placeholderNote;
}

function toggleLang() {
  lang = (lang === "tr") ? "en" : "tr";
  localStorage.setItem("lang", lang);
  applyLang();
}

function ozetle() {
  let text = document.getElementById("text").value;
  let words = text.split(" ");
  document.getElementById("summary").innerText =
    words.slice(0, 20).join(" ") + "...";
}

function createTags() {
  let input = document.getElementById("tagInput").value;
  document.getElementById("tags").innerText =
    "#" + input + " #viral #trend #explore #fyp";
}

function saveNote() {
  let note = document.getElementById("note").value;
  localStorage.setItem("note", note);
  alert(lang === "tr" ? "Kaydedildi!" : "Saved!");
}

window.onload = function() {
  applyLang();
  let saved = localStorage.getItem("note");
  if (saved) document.getElementById("note").value = saved;
};
</script>

</body>
</html>
