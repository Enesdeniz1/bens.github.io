<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DERS PDF</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER RGB */
header {
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(270deg, red, orange, yellow, green, cyan, blue, purple);
    background-size: 1000% 100%;
    animation: rgb 8s linear infinite;
}

@keyframes rgb {
    0% {background-position: 0%}
    100% {background-position: 100%}
}

/* MENU */
.menu-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    font-size: 25px;
    cursor: pointer;
}

.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: #1e293b;
    padding-top: 60px;
    transition: 0.3s;
}

.sidebar a {
    display: block;
    padding: 12px;
    border-bottom: 1px solid #334155;
    cursor: pointer;
}

.sidebar a:hover {
    background: #334155;
}

/* SEARCH */
.search {
    padding: 10px;
    width: 90%;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

/* CARD */
.container {
    padding: 10px;
}

.card {
    background: #1e293b;
    margin: 15px 0;
    padding: 15px;
    border-radius: 12px;
}

iframe {
    width: 100%;
    height: 200px;
    margin-top: 10px;
}

/* FAVORITE */
.star {
    cursor: pointer;
    font-size: 20px;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>
<header>DERS PDF</header>

<div class="sidebar" id="menu">
<a onclick="show('mat')">📐 Matematik</a>
<a onclick="show('din')">🕌 Din</a>
<a onclick="show('fizik')">⚡ Fizik</a>
<a onclick="show('kimya')">🧪 Kimya</a>
<a onclick="show('biyoloji')">🧬 Biyoloji</a>
<a onclick="showFavorites()">⭐ Favoriler</a>
</div>

<input type="text" class="search" placeholder="🔍 Ara..." onkeyup="search(this.value)">

<div class="container" id="content"></div>

<script>

let videos = [
 {title:"Mat 2D2Y", url:"https://www.youtube.com/embed/cI-l3zXT57U"},
 {title:"Mat 2D2Y 2", url:"https://www.youtube.com/embed/XeLppC_KnUk"},
 {title:"Din 2D2Y", url:"https://www.youtube.com/embed/Db8ltXb0Uz4"},
 {title:"Fizik Yazılı", url:"https://www.youtube.com/embed/8kYl6Z0FJ7Q"},
 {title:"Kimya Yazılı", url:"https://www.youtube.com/embed/3vYlP9Xz2A8"},
 {title:"Biyoloji Yazılı", url:"https://www.youtube.com/embed/7dKpL9Xc2B0"}
];

function render(list){
    let c = document.getElementById("content");
    c.innerHTML = "";

    list.forEach((v,i)=>{
        let fav = isFav(v.url) ? "⭐" : "☆";

        c.innerHTML += `
        <div class="card">
            <b>${v.title}</b>
            <span class="star" onclick="toggleFav('${v.url}')">${fav}</span>
            <iframe src="${v.url}"></iframe>
        </div>
        `;
    });
}

function search(q){
    let filtered = videos.filter(v => v.title.toLowerCase().includes(q.toLowerCase()));
    render(filtered);
}

function show(ders){
    let filtered = videos.filter(v => v.title.toLowerCase().includes(ders));
    render(filtered);
}

function toggleMenu(){
    let m = document.getElementById("menu");
    m.style.left = (m.style.left === "0px") ? "-250px" : "0px";
}

/* FAVORITE SYSTEM */
function getFav(){
    return JSON.parse(localStorage.getItem("fav") || "[]");
}

function isFav(url){
    return getFav().includes(url);
}

function toggleFav(url){
    let fav = getFav();
    if(fav.includes(url)){
        fav = fav.filter(f => f !== url);
    } else {
        fav.push(url);
    }
    localStorage.setItem("fav", JSON.stringify(fav));
    render(videos);
}

function showFavorites(){
    let fav = getFav();
    let list = videos.filter(v => fav.includes(v.url));
    render(list);
}

/* INIT */
render(videos);

</script>

</body>
</html>
