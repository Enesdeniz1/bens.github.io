<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENES DENİZ | FINAL BOSS</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;transition:.3s}

/* LOGO */
header{
 padding:15px;
 text-align:center;
 font-size:26px;
 font-weight:bold;
 background:linear-gradient(270deg,red,orange,yellow,green,cyan,blue,purple);
 background-size:1000% 100%;
 animation:rgb 10s linear infinite;
}
@keyframes rgb{
 0%{background-position:0%}
 100%{background-position:100%}
}

/* FORM */
.form{padding:10px;background:#1e293b}
input,textarea{
 width:100%;margin:5px 0;padding:10px;border:none;border-radius:8px
}
button{
 padding:10px;width:100%;border:none;border-radius:8px;
 background:#22c55e;cursor:pointer
}

/* CARD */
.container{padding:10px}
.card{
 background:#1e293b;
 margin:15px 0;
 padding:15px;
 border-radius:12px;
 transition:.3s
}
.card:hover{transform:scale(1.02)}

video{width:100%;border-radius:10px;margin-top:10px}

/* ACTIONS */
.actions{display:flex;gap:10px;margin-top:10px}
.delete{background:red}
.edit{background:orange}
.star{cursor:pointer;float:right;font-size:20px}

/* SEARCH */
.search{
 width:95%;
 margin:10px;
 padding:10px;
 border-radius:8px;
 border:none;
}

/* THEME */
.light{background:white;color:black}

.stats{padding:10px;font-size:14px}

</style>
</head>

<body>

<header>ENES DENİZ ⚡ FINAL BOSS</header>

<input class="search" placeholder="🔍 Ara..." onkeyup="search(this.value)">

<div class="stats" id="stats">📊 Video: 0</div>

<div class="form">
<input id="title" placeholder="Başlık">
<textarea id="desc" placeholder="Açıklama"></textarea>
<input type="file" id="file">
<button onclick="upload()">⬆ Yükle</button>
<button onclick="toggleTheme()">🌙 Tema</button>
</div>

<div class="container" id="videos"></div>

<script>

/* STATE */
let videos = JSON.parse(localStorage.getItem("videos")||"[]");

/* UPLOAD */
async function upload(){
 let file=document.getElementById("file").files[0];
 let title=document.getElementById("title").value;
 let desc=document.getElementById("desc").value;

 if(!file){alert("Video seç!");return;}

 let form=new FormData();
 form.append("video",file);

 let res=await fetch("/upload",{method:"POST",body:form});
 let data=await res.json();

 videos.unshift({
  title,desc,url:data.url,fav:false
 });

 save();
}

/* SAVE */
function save(){
 localStorage.setItem("videos",JSON.stringify(videos));
 render();
}

/* DELETE */
function del(i){
 if(confirm("Sil?")){
  videos.splice(i,1);
  save();
 }
}

/* FAVORI */
function fav(i){
 videos[i].fav=!videos[i].fav;
 save();
}

/* EDIT */
function edit(i){
 let t=prompt("Başlık:",videos[i].title);
 let d=prompt("Açıklama:",videos[i].desc);

 if(t) videos[i].title=t;
 if(d) videos[i].desc=d;

 save();
}

/* SEARCH */
function search(q){
 let html="";

 videos.forEach((v,i)=>{
  if(v.title.toLowerCase().includes(q.toLowerCase())){
   html+=card(v,i);
  }
 });

 document.getElementById("videos").innerHTML=html;
}

/* CARD */
function card(v,i){
 let star=v.fav?"⭐":"☆";

 return `
 <div class="card">
 <b>${v.title}</b>
 <span class="star" onclick="fav(${i})">${star}</span>

 <p>${v.desc}</p>

 <video controls src="${v.url}"></video>

 <div class="actions">
  <button class="delete" onclick="del(${i})">Sil</button>
  <button class="edit" onclick="edit(${i})">Düzenle</button>
 </div>
 </div>
 `;
}

/* RENDER */
function render(){
 let html="";

 videos.forEach((v,i)=>{
  html+=card(v,i);
 });

 document.getElementById("videos").innerHTML=html;
 document.getElementById("stats").innerText="📊 Video: "+videos.length;
}

/* THEME */
function toggleTheme(){
 document.body.classList.toggle("light");
}

/* INIT */
render();

</script>

</body>
</html>
