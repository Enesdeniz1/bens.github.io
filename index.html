<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapTools</title>

<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }

body {
  margin: 0;
  background: #f4f4f4;
  text-align: center;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: black;
  color: white;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

button.lang {
  background: white;
  color: black;
  border-radius: 6px;
  padding: 5px 10px;
  border: none;
  cursor: pointer;
}

.container {
  max-width: 500px;
  margin: auto;
}

.box {
  background: white;
  padding: 20px;
  margin: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

textarea, input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button.action {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 10px;
  background: #eee;
  padding: 10px;
  border-radius: 8px;
  word-break: break-word;
}

.insta {
  color:#777;
  text-decoration:none;
  font-size:13px;
}
.insta:hover { color:black; }
</style>
</head>

<body>

<header>
  <div class="logo">⚡ SnapTools</div>
  <button class="lang" onclick="toggleLang()">TR / EN</button>
</header>

<div class="container">

  <!-- ÖZET -->
  <div class="box">
    <h3 id="sumTitle">Metin Özetleyici</h3>
    <textarea id="text" placeholder="Metni buraya yaz..."></textarea>
    <button class="action" onclick="ozetle()" id="sumBtn">Özetle</button>
    <div class="result" id="summary"></div>
  </div>

  <!-- HASHTAG -->
  <div class="box">
    <h3 id="tagTitle">Hashtag Oluşturucu (30 adet)</h3>
    <input id="tagInput" placeholder="Konu yaz (örn: ronaldo)">
    <button class="action" onclick="createTags()" id="tagBtn">Oluştur</button>
    <div class="result" id="tags"></div>
  </div>

  <!-- NOT -->
  <div class="box">
    <h3 id="noteTitle">Not Defteri</h3>
    <textarea id="note" placeholder="Notunu yaz..."></textarea>
    <button class="action" onclick="saveNote()" id="saveBtn">Kaydet</button>
  </div>

</div>

<!-- INSTAGRAM -->
<div style="margin:20px;">
  <a href="https://instagram.com/hfwxq" target="_blank" class="insta">
    @hfwxq
  </a>
</div>

<script>
let lang = localStorage.getItem("lang") || "tr";

const texts = {
  tr: {
    sumTitle: "Metin Özetleyici",
    sumBtn: "Özetle",
    tagTitle: "Hashtag Oluşturucu (30 adet)",
    tagBtn: "Oluştur",
    noteTitle: "Not Defteri",
    saveBtn: "Kaydet",
    textPH: "Metni buraya yaz...",
    tagPH: "Konu yaz (örn: ronaldo)",
    notePH: "Notunu yaz..."
  },
  en: {
    sumTitle: "Text Summarizer",
    sumBtn: "Summarize",
    tagTitle: "Hashtag Generator (30 tags)",
    tagBtn: "Generate",
    noteTitle: "Notepad",
    saveBtn: "Save",
    textPH: "Enter your text...",
    tagPH: "Enter topic (e.g. ronaldo)",
    notePH: "Write your note..."
  }
};

function applyLang() {
  let t = texts[lang];

  document.getElementById("sumTitle").innerText = t.sumTitle;
  document.getElementById("sumBtn").innerText = t.sumBtn;
  document.getElementById("tagTitle").innerText = t.tagTitle;
  document.getElementById("tagBtn").innerText = t.tagBtn;
  document.getElementById("noteTitle").innerText = t.noteTitle;
  document.getElementById("saveBtn").innerText = t.saveBtn;

  document.getElementById("text").placeholder = t.textPH;
  document.getElementById("tagInput").placeholder = t.tagPH;
  document.getElementById("note").placeholder = t.notePH;
}

function toggleLang() {
  lang = (lang === "tr") ? "en" : "tr";
  localStorage.setItem("lang", lang);
  applyLang();
}

// ÖZET
function ozetle() {
  let text = document.getElementById("text").value.trim();
  if (!text) return;

  let words = text.split(" ");
  document.getElementById("summary").innerText =
    words.slice(0, 20).join(" ") + "...";
}

// HASHTAG (30)
function createTags() {
  let input = document.getElementById("tagInput").value.trim().toLowerCase();
  if (!input) return;

  let base = input.replace(/\s+/g, "");

  let tags = [
    base, base+"edit", base+"video", base+"fans", base+"love",
    base+"trend", base+"viral", base+"reels", base+"tiktok",
    base+"explore", base+"explorepage", base+"instagood",
    base+"fyp", base+"like", base+"follow",
    "football","soccer","skills","goals","highlights",
    "legend","champion","best","top","world",
    "star","motivation","success","editz","viralvideo"
  ];

  let result = tags.map(t => "#" + t).join(" ");
  document.getElementById("tags").innerText = result;
}

// NOT
function saveNote() {
  let note = document.getElementById("note").value;
  localStorage.setItem("note", note);
  alert(lang === "tr" ? "Kaydedildi!" : "Saved!");
}

window.onload = function() {
  applyLang();
  let saved = localStorage.getItem("note");
  if (saved) document.getElementById("note").value = saved;
};
</script>

</body>
</html>
