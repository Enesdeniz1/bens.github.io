<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENES DENİZ | ARAMA</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f172a;
 color:white;
 transition:0.3s;
 text-align:center;
}

/* HEADER */
header{
 padding:15px;
 font-size:22px;
 background:linear-gradient(270deg,red,orange,yellow,green,cyan,blue,purple);
}

/* MENU BUTTON */
.menu-btn{
 position:fixed;
 top:10px;
 left:15px;
 font-size:28px;
 cursor:pointer;
}

/* SIDEBAR */
.sidebar{
 position:fixed;
 left:-260px;
 top:0;
 width:260px;
 height:100%;
 background:#1e293b;
 transition:0.3s;
 padding-top:60px;
}

.sidebar.open{
 left:0;
}

/* CLOSE */
.close-btn{
 position:absolute;
 top:10px;
 right:15px;
 font-size:24px;
 cursor:pointer;
}

/* BUTTON */
.sidebar button{
 width:100%;
 padding:12px;
 border:none;
 background:none;
 color:white;
 text-align:left;
 cursor:pointer;
}

.sidebar button:hover{
 background:#334155;
}

/* SEARCH */
.search{
 width:90%;
 max-width:400px;
 padding:15px;
 margin-top:40px;
 border:none;
 border-radius:10px;
 font-size:16px;
}

/* LIGHT MODE */
.light{
 background:white;
 color:black;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="openMenu()">☰</div>

<header>ENES DENİZ 🔍</header>

<div class="sidebar" id="menu">
<div class="close-btn" onclick="closeMenu()">✖</div>

<!-- SINAV -->
<button onclick="setExam('1d1y')">📘 1D1Y</button>
<button onclick="setExam('1d2y')">📗 1D2Y</button>
<button onclick="setExam('2d1y')">📙 2D1Y</button>
<button onclick="setExam('2d2y')">📕 2D2Y</button>

<hr>

<!-- SEVİYE -->
<button onclick="setLevel('ilkokul')">📚 İlkokul</button>
<button onclick="setLevel('ortaokul')">🧠 Ortaokul</button>
<button onclick="setLevel('lise')">🎓 Lise</button>

<hr>

<!-- TEMA -->
<button onclick="toggleTheme()">🌙 Tema</button>

</div>

<input 
class="search" 
id="searchInput" 
placeholder="Ders yaz (örn: matematik)" 
onkeypress="enterSearch(event)"
>

<br>

<button onclick="goSearch()" style="margin-top:15px;padding:10px 20px;border:none;border-radius:10px;background:#22c55e;color:white;">
ARA
</button>

<script>

/* STATE */
let currentExam="2d2y";
let currentLevel="lise";

/* MENU */
function openMenu(){
 document.getElementById("menu").classList.add("open");
}
function closeMenu(){
 document.getElementById("menu").classList.remove("open");
}

/* SET */
function setExam(e){
 currentExam=e;
 closeMenu();
}
function setLevel(l){
 currentLevel=l;
 closeMenu();
}

/* ENTER */
function enterSearch(e){
 if(e.key==="Enter"){
  goSearch();
 }
}

/* SEARCH */
function goSearch(){
 let q=document.getElementById("searchInput").value.trim();

 if(q===""){
  alert("Bir şey yaz 😄");
  return;
 }

 /* OTOMATİK EKLE */
 let fullQuery = q + " " + currentExam + " " + currentLevel;

 let url="https://www.youtube.com/results?search_query="+encodeURIComponent(fullQuery);

 window.open(url,"_blank");
}

/* THEME */
function toggleTheme(){
 document.body.classList.toggle("light");
}

</script>

</body>
</html>
