<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENES DENİZ PLATFORM</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f172a;
 color:white;
 transition:0.3s;
}

/* HEADER */
header{
 padding:15px;
 text-align:center;
 font-size:22px;
 background:linear-gradient(270deg,red,orange,yellow,green,cyan,blue,purple);
}

/* MENU BUTTON */
.menu-btn{
 position:fixed;
 top:10px;
 left:15px;
 font-size:28px;
 cursor:pointer;
 z-index:1000;
}

/* SIDEBAR */
.sidebar{
 position:fixed;
 left:-260px;
 top:0;
 width:260px;
 height:100%;
 background:#1e293b;
 transition:0.3s;
 padding-top:60px;
 z-index:999;
}

.sidebar.open{
 left:0;
}

/* CLOSE BUTTON */
.close-btn{
 position:absolute;
 top:10px;
 right:15px;
 font-size:24px;
 cursor:pointer;
}

/* MENU BUTTONS */
.sidebar button{
 width:100%;
 padding:12px;
 border:none;
 background:none;
 color:white;
 text-align:left;
 cursor:pointer;
}

.sidebar button:hover{
 background:#334155;
}

/* SEARCH */
.search{
 width:95%;
 margin:10px;
 padding:10px;
 border-radius:8px;
 border:none;
}

/* CARD */
.card{
 margin:10px;
 padding:10px;
 border-radius:10px;
 background:#1e293b;
 display:flex;
 gap:10px;
 cursor:pointer;
}

.card img{
 width:120px;
 border-radius:8px;
}

/* COLORS */
.matematik{border-left:5px solid #3b82f6;}
.fizik{border-left:5px solid #f97316;}
.kimya{border-left:5px solid #22c55e;}
.felsefe{border-left:5px solid #a855f7;}

/* LIGHT MODE */
.light{
 background:white;
 color:black;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="openMenu()">☰</div>

<header>ENES DENİZ 🎓</header>

<div class="sidebar" id="menu">
<div class="close-btn" onclick="closeMenu()">✖</div>

<button onclick="setExam('1d1y')">📘 1D1Y</button>
<button onclick="setExam('1d2y')">📗 1D2Y</button>
<button onclick="setExam('2d1y')">📙 2D1Y</button>
<button onclick="setExam('2d2y')">📕 2D2Y</button>

<hr>

<button onclick="setLevel('ilkokul')">📚 İlkokul</button>
<button onclick="setLevel('ortaokul')">🧠 Ortaokul</button>
<button onclick="setLevel('lise')">🎓 Lise</button>

<hr>

<button onclick="toggleTheme()">🌙 Tema</button>

</div>

<input class="search" placeholder="🔍 Ara..." onkeyup="search(this.value)">

<div id="results"></div>

<script>

/* STATE */
let currentLevel="lise";
let currentExam="2d2y";

/* MENU */
function openMenu(){
 document.getElementById("menu").classList.add("open");
}
function closeMenu(){
 document.getElementById("menu").classList.remove("open");
}

/* DATA (ÇALIŞAN VİDEOLAR) */
let videoDB=[
{title:"Matematik 1d2y",level:"lise",exam:"1d2y",id:"dQw4w9WgXcQ"},
{title:"Fizik 2d2y",level:"lise",exam:"2d2y",id:"M7lc1UVf-VE"},
{title:"Kimya 2d1y",level:"lise",exam:"2d1y",id:"ysz5S6PUM-U"},
{title:"Felsefe 1d2y",level:"lise",exam:"1d2y",id:"aqz-KE-bpKQ"},
{title:"Türkçe 1d1y",level:"ilkokul",exam:"1d1y",id:"e-ORhEE9VVg"}
];

/* CLASS */
function getClass(t){
 t=t.toLowerCase();
 if(t.includes("matematik")) return "matematik";
 if(t.includes("fizik")) return "fizik";
 if(t.includes("kimya")) return "kimya";
 if(t.includes("felsefe")) return "felsefe";
 return "";
}

/* SEARCH */
function search(q){
 let html="";

 videoDB.forEach(v=>{
  if(v.level===currentLevel && v.exam===currentExam && v.title.toLowerCase().includes(q.toLowerCase())){
   html+=`
   <div class="card ${getClass(v.title)}" onclick="openVideo('${v.id}')">
    <img src="https://img.youtube.com/vi/${v.id}/0.jpg">
    <div>${v.title}</div>
   </div>`;
  }
 });

 document.getElementById("results").innerHTML=html;
}

/* OPEN */
function openVideo(id){
 window.open("https://www.youtube.com/watch?v="+id,"_blank");
}

/* SET */
function setLevel(l){currentLevel=l;closeMenu();}
function setExam(e){currentExam=e;closeMenu();}

/* THEME */
function toggleTheme(){
 document.body.classList.toggle("light");
}

</script>

</body>
</html>
