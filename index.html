<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hayat Motoru PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

/* HEADER */
header{
padding:15px;
font-size:22px;
font-weight:bold;
background:linear-gradient(270deg,#ff0080,#7928ca,#2af598);
background-size:600% 600%;
animation:rgb 6s infinite;
}

@keyframes rgb{
0%{background-position:0%}
100%{background-position:100%}
}

/* BUTTON GRID */
.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#334155;
}

/* RESULT */
.result{
padding:10px;
}

/* CARD */
.card{
background:#1e293b;
margin:10px 0;
padding:15px;
border-radius:10px;
text-align:left;
position:relative;
}

/* STAR */
.star{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
}

/* VIDEO */
iframe{
width:100%;
height:200px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>🧠 Hayat Motoru PRO</header>

<div class="buttons">

<button onclick="run('sinav')">📚 Sınav</button>
<button onclick="run('para')">💸 Para</button>
<button onclick="run('sikildim')">😐 Sıkıldım</button>
<button onclick="run('uyku')">😴 Uyku</button>
<button onclick="run('motivasyon')">🔥 Motivasyon</button>
<button onclick="run('spor')">🏋️ Spor</button>
<button onclick="run('aşk')">❤️ Aşk</button>
<button onclick="run('arkadas')">👥 Arkadaş</button>
<button onclick="run('odak')">🎯 Odak</button>
<button onclick="run('alışkanlık')">🔁 Alışkanlık</button>
<button onclick="run('paraonline')">💻 Online Para</button>
<button onclick="run('zengin')">💎 Zenginlik</button>
<button onclick="run('film')">🎬 Film</button>
<button onclick="run('kitap')">📖 Kitap</button>
<button onclick="run('yazılım')">💻 Yazılım</button>

<button onclick="makePlan()">📅 Plan</button>
<button onclick="showFav()">⭐ Favoriler</button>

</div>

<div class="result" id="result"></div>

<script>

/* DATA */
let data = {

sinav:["Pomodoro başla","Özet oku","Çıkmış çöz"],
para:["Freelance başla","Site yap","Edit öğren"],
sikildim:["Film izle","Oyun oyna","Yürüyüş yap"],
uyku:["Telefon bırak","Müzik aç","Işık kapat"],

motivasyon:["Hedef yaz","Kendine söz ver","Hemen başla"],
spor:["20 şınav","Koşu yap","Evde antrenman"],
aşk:["Mesaj at","Kendine odaklan","Sabırlı ol"],
arkadas:["Mesaj at","Dışarı çık","Yeni kişi tanı"],

odak:["Telefonu kapat","Sessiz ortam","Zamanlayıcı kur"],
alışkanlık:["21 gün devam et","Küçük başla","Takip et"],
paraonline:["Dropshipping bak","İçerik üret","Freelance"],
zengin:["Yatırım öğren","Risk al","Disiplin"],

film:["Aksiyon izle","Komedi izle","Bilim kurgu"],
kitap:["Kişisel gelişim","Roman oku","Not al"],
yazılım:["HTML öğren","JS çalış","Proje yap"]

};

let videos = [
"https://www.youtube.com/embed/ZXsQAXx_ao0",
"https://www.youtube.com/embed/5MgBikgcWnY",
"https://www.youtube.com/embed/tbnzAVRZ9Xc",
"https://www.youtube.com/embed/dQw4w9WgXcQ"
];

/* RANDOM */
function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* FAVORITE */
function getFav(){
return JSON.parse(localStorage.getItem("fav")||"[]");
}

function toggleFav(text){
let fav=getFav();

if(fav.includes(text)){
fav=fav.filter(f=>f!==text);
}else{
fav.push(text);
}

localStorage.setItem("fav",JSON.stringify(fav));
renderCard(text);
}

/* CARD */
function renderCard(text){
let video=rand(videos);
let fav = getFav().includes(text) ? "⭐" : "☆";

document.getElementById("result").innerHTML=`
<div class="card">
<span class="star" onclick="toggleFav('${text}')">${fav}</span>
${text}
<iframe src="${video}" allowfullscreen></iframe>
</div>
`;
}

/* RUN */
function run(type){
let text=rand(data[type]);
renderCard(text);
}

/* PLAN */
function makePlan(){
let saatler=["10:00","12:00","14:00","16:00","18:00"];
let aktiviteler=["Ders","Video","Yürüyüş","Tekrar","Dinlen"];

let html="<div class='card'>";

for(let i=0;i<saatler.length;i++){
html+=`⏰ ${saatler[i]} → ${rand(aktiviteler)}<br>`;
}

html+="</div>";

document.getElementById("result").innerHTML=html;
}

/* FAVORITES */
function showFav(){
let fav=getFav();
let html="";

fav.forEach(f=>{
html+=`<div class="card">${f}</div>`;
});

document.getElementById("result").innerHTML=html || "Favori yok 😢";
}

</script>

</body>
</html>
